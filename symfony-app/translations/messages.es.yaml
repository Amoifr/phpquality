# Metrics documentation page
docs:
    title: "Documentacion de Metricas"
    subtitle: "Entendiendo las metricas de calidad de codigo medidas por PhpQuality"
    quick_nav: "Navegacion Rapida"
    lines_of_code: "Lineas de Codigo"
    cyclomatic_complexity: "Complejidad Ciclomatica"
    maintainability_index: "Indice de Mantenibilidad"
    lack_of_cohesion: "Falta de Cohesion"
    halstead_metrics: "Metricas Halstead"
    rating_system: "Sistema de Calificacion"

    loc_intro: "Las metricas LOC miden el tamano y composicion de su base de codigo."
    loc_metrics: "Metricas"
    loc_total: "Lineas de Codigo Totales - Todas las lineas en el archivo incluyendo lineas vacias y comentarios"
    loc_cloc: "Lineas de Comentarios - Lineas que contienen comentarios (// /* */ # /** */)"
    loc_lloc: "Lineas de Codigo Logicas - Sentencias ejecutables (if, for, return, expresiones, etc.)"
    loc_ratio: "Ratio de Comentarios"
    loc_ratio_formula: "Ratio de Comentarios = (CLOC / LOC) * 100%"
    loc_interpretation: "Un ratio de comentarios saludable esta tipicamente entre 10-30%. Muy pocos comentarios pueden indicar pobre documentacion, mientras que comentarios excesivos pueden sugerir codigo demasiado complejo que necesita refactorizacion."
    loc_logical_statements: "Sentencias Logicas Contadas"

    ccn_intro: "La Complejidad Ciclomatica, desarrollada por Thomas J. McCabe en 1976, mide el numero de caminos linealmente independientes a traves del codigo fuente de un programa."
    ccn_formula_alt: "Formula alternativa basada en grafos: CCN = E - N + 2P donde E = aristas, N = nodos, P = componentes conectados."
    ccn_why_matters: "Alta CCN indica codigo que es dificil de probar completamente. Un metodo con CCN de 10 requiere al menos 10 casos de prueba para cobertura completa de ramas."

    mi_intro: "El Indice de Mantenibilidad es una metrica compuesta que combina Volumen Halstead, Complejidad Ciclomatica y Lineas de Codigo en una puntuacion unica de 0-100."
    mi_volume: "Volumen Halstead - mide el tamano de la implementacion"
    mi_ccn: "Complejidad Ciclomatica - mide la complejidad estructural"
    mi_loc: "Lineas de Codigo - mide el tamano fisico"
    mi_interpretation: "Una puntuacion por encima de 65 es generalmente aceptable. Puntuaciones por debajo de 40 indican codigo que deberia priorizarse para refactorizacion. El MI disminuye a medida que aumenta la complejidad."

    lcom_intro: "LCOM mide que tan bien los metodos de una clase estan relacionados entre si a traves de variables de instancia compartidas. Una clase cohesiva tiene metodos que trabajan juntos en los mismos datos."
    lcom_formula_variant: "Variante LCOM4"
    lcom_more_specific: "Mas especificamente"
    lcom_why_matters: "Alto LCOM sugiere que una clase puede estar haciendo demasiadas cosas no relacionadas y deberia dividirse. Una clase donde cada metodo usa diferentes propiedades es candidata para refactorizacion en multiples clases."

    halstead_intro: "Las metricas Halstead, introducidas por Maurice Halstead en 1977, miden la complejidad del software basandose en los operadores y operandos distintos y totales en el codigo."
    halstead_operators_tracked: "Operadores Rastreados"
    halstead_volume_interpretation: "Volumen por debajo de 100 indica una funcion simple. Volumen por encima de 1000 sugiere que el codigo deberia dividirse en unidades mas pequenas. La metrica de Volumen se usa en el calculo del Indice de Mantenibilidad."

    ratings_intro: "PhpQuality usa un sistema de calificacion con letras (A-F) para identificar rapidamente los niveles de calidad del codigo en todas las metricas."
    ratings_meanings: "Significados de Calificaciones"
    ratings_excellent: "Codigo limpio y mantenible"
    ratings_good: "Mejoras menores posibles"
    ratings_moderate: "Considerar refactorizacion"
    ratings_poor: "Necesita atencion"
    ratings_critical: "Refactorizacion inmediata necesaria"
    ratings_thresholds: "Umbrales por Metrica"

    references: "Referencias"

