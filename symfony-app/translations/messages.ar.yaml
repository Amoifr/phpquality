    rating_system: "نظام التقييم"

    loc_intro: "تقيس مقاييس أسطر الكود حجم وتكوين قاعدة الكود الخاصة بك."
    loc_metrics: "المقاييس"
    loc_total: "إجمالي أسطر الكود - جميع الأسطر في الملف بما في ذلك الأسطر الفارغة والتعليقات"
    loc_cloc: "أسطر الكود التعليقية - الأسطر التي تحتوي على تعليقات (// /* */ # /** */)"
    loc_lloc: "أسطر الكود المنطقية - العبارات القابلة للتنفيذ (if، for، return، التعبيرات، إلخ.)"
    loc_ratio: "نسبة التعليقات"
    loc_ratio_formula: "نسبة التعليقات = (CLOC / LOC) * 100%"
    loc_interpretation: "نسبة التعليقات الصحية تتراوح عادةً بين 10-30%. تعليقات قليلة جداً قد تشير إلى توثيق ضعيف، بينما التعليقات المفرطة قد تشير إلى كود معقد يحتاج إلى إعادة هيكلة."
    loc_logical_statements: "العبارات المنطقية المحسوبة"

    ccn_intro: "التعقيد الدوري، الذي طوره توماس ج. ماكابي في 1976، يقيس عدد المسارات المستقلة خطياً عبر الكود المصدري للبرنامج."
    ccn_formula_alt: "معادلة بديلة قائمة على الرسم البياني: CCN = E - N + 2P حيث E = الحواف، N = العقد، P = المكونات المتصلة."
    ccn_why_matters: "CCN عالي يشير إلى كود صعب الاختبار بالكامل. دالة مع CCN من 10 تتطلب 10 حالات اختبار على الأقل لتغطية كاملة للفروع."

    mi_intro: "مؤشر قابلية الصيانة هو مقياس مركب يجمع بين حجم هالستيد والتعقيد الدوري وأسطر الكود في درجة واحدة من 0-100."
    mi_volume: "حجم هالستيد - يقيس حجم التنفيذ"
    mi_ccn: "التعقيد الدوري - يقيس التعقيد الهيكلي"
    mi_loc: "أسطر الكود - يقيس الحجم الفعلي"
    mi_interpretation: "درجة أعلى من 65 مقبولة عموماً. الدرجات أقل من 40 تشير إلى كود يجب إعطاؤه الأولوية لإعادة الهيكلة. MI ينخفض مع زيادة التعقيد."

    lcom_intro: "LCOM يقيس مدى ارتباط دوال الفئة ببعضها البعض من خلال متغيرات المثيل المشتركة. الفئة المتماسكة لديها دوال تعمل معاً على نفس البيانات."
    lcom_formula_variant: "متغير LCOM4"
    lcom_more_specific: "بشكل أكثر تحديداً"
    lcom_why_matters: "LCOM عالي يشير إلى أن الفئة قد تقوم بأشياء كثيرة غير مرتبطة ويجب تقسيمها. الفئة التي تستخدم فيها كل دالة خصائص مختلفة هي مرشحة لإعادة الهيكلة إلى فئات متعددة."

    halstead_intro: "مقاييس هالستيد، التي قدمها موريس هالستيد في 1977، تقيس تعقيد البرمجيات بناءً على المعاملات والمعاملات المميزة والإجمالية في الكود."
    halstead_operators_tracked: "المعاملات المتتبعة"
    halstead_volume_interpretation: "الحجم أقل من 100 يشير إلى دالة بسيطة. الحجم أكثر من 1000 يشير إلى أن الكود يجب تقسيمه إلى وحدات أصغر. مقياس الحجم يستخدم في حساب مؤشر قابلية الصيانة."

    ratings_intro: "يستخدم PhpQuality نظام تقييم بالحروف (A-F) لتحديد مستويات جودة الكود بسرعة عبر جميع المقاييس."
    ratings_meanings: "معاني التقييم"
    ratings_excellent: "كود نظيف وقابل للصيانة"
    ratings_good: "تحسينات طفيفة ممكنة"
    ratings_moderate: "فكر في إعادة الهيكلة"
    ratings_poor: "يحتاج اهتماماً"
    ratings_critical: "إعادة هيكلة فورية مطلوبة"
    ratings_thresholds: "الحدود حسب المقياس"

    references: "المراجع"

