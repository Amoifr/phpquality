    ccn_intro: "ความซับซ้อนเชิงวงจร พัฒนาโดย Thomas J. McCabe ในปี 1976 วัดจำนวนเส้นทางอิสระเชิงเส้นผ่านโค้ดต้นฉบับของโปรแกรม"
    ccn_formula_alt: "สูตรทางเลือกตามกราฟ: CCN = E - N + 2P โดยที่ E = ขอบ, N = โหนด, P = ส่วนประกอบที่เชื่อมต่อ"
    ccn_why_matters: "CCN สูงบ่งบอกว่าโค้ดยากที่จะทดสอบอย่างสมบูรณ์ เมธอดที่มี CCN เป็น 10 ต้องการอย่างน้อย 10 กรณีทดสอบเพื่อครอบคลุมสาขาอย่างเต็มที่"

    mi_intro: "ดัชนีการบำรุงรักษาเป็นเมตริกแบบผสมที่รวมปริมาตร Halstead ความซับซ้อนเชิงวงจร และบรรทัดโค้ดเป็นคะแนนเดียวตั้งแต่ 0-100"
    mi_volume: "ปริมาตร Halstead - วัดขนาดของการดำเนินการ"
    mi_ccn: "ความซับซ้อนเชิงวงจร - วัดความซับซ้อนเชิงโครงสร้าง"
    mi_loc: "บรรทัดโค้ด - วัดขนาดทางกายภาพ"
    mi_interpretation: "คะแนนเหนือ 65 โดยทั่วไปยอมรับได้ คะแนนต่ำกว่า 40 บ่งบอกว่าโค้ดควรได้รับความสำคัญในการปรับโครงสร้าง MI ลดลงเมื่อความซับซ้อนเพิ่มขึ้น"

    lcom_intro: "LCOM วัดว่าเมธอดของคลาสเกี่ยวข้องกันมากแค่ไหนผ่านตัวแปรอินสแตนซ์ที่ใช้ร่วมกัน คลาสที่มีความเชื่อมโยงมีเมธอดที่ทำงานร่วมกันบนข้อมูลเดียวกัน"
    lcom_formula_variant: "ตัวแปร LCOM4"
    lcom_more_specific: "โดยเฉพาะกว่านั้น"
    lcom_why_matters: "LCOM สูงบ่งบอกว่าคลาสอาจทำสิ่งที่ไม่เกี่ยวข้องมากเกินไปและควรแยก คลาสที่แต่ละเมธอดใช้คุณสมบัติต่างกันเป็นตัวเลือกสำหรับการปรับโครงสร้างเป็นหลายคลาส"

    halstead_intro: "เมตริก Halstead นำเสนอโดย Maurice Halstead ในปี 1977 วัดความซับซ้อนของซอฟต์แวร์ตามตัวดำเนินการและตัวถูกดำเนินการที่แตกต่างและทั้งหมดในโค้ด"
    halstead_operators_tracked: "ตัวดำเนินการที่ติดตาม"
    halstead_volume_interpretation: "ปริมาตรต่ำกว่า 100 บ่งบอกว่าฟังก์ชันง่าย ปริมาตรเกิน 1000 บ่งบอกว่าโค้ดควรแยกเป็นหน่วยที่เล็กกว่า เมตริกปริมาตรใช้ในการคำนวณดัชนีการบำรุงรักษา"

    ratings_intro: "PhpQuality ใช้ระบบการจัดอันดับแบบตัวอักษร (A-F) เพื่อระบุระดับคุณภาพโค้ดอย่างรวดเร็วในทุกเมตริก"
