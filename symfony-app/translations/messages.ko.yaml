# Metrics documentation page
docs:
    title: "메트릭 문서"
    subtitle: "PhpQuality가 측정하는 코드 품질 메트릭 이해하기"
    quick_nav: "빠른 탐색"
    lines_of_code: "코드 라인"
    cyclomatic_complexity: "순환 복잡도"
    maintainability_index: "유지보수성 지수"
    lack_of_cohesion: "응집력 부족"
    halstead_metrics: "Halstead 메트릭"
    rating_system: "등급 시스템"

    loc_intro: "LOC 메트릭은 코드베이스의 크기와 구성을 측정합니다."
    loc_metrics: "메트릭"
    loc_total: "전체 코드 라인 - 공백 라인과 주석을 포함한 파일의 모든 라인"
    loc_cloc: "주석 라인 - 주석이 포함된 라인 (// /* */ # /** */)"
    loc_lloc: "논리적 코드 라인 - 실행 가능 문장 (if, for, return, 표현식 등)"
    loc_ratio: "주석 비율"
    loc_ratio_formula: "주석 비율 = (CLOC / LOC) * 100%"
    loc_interpretation: "건강한 주석 비율은 일반적으로 10-30%입니다. 주석이 너무 적으면 문서화 부족을 나타낼 수 있고, 과도한 주석은 리팩토링이 필요한 복잡한 코드를 나타낼 수 있습니다."
    loc_logical_statements: "계산되는 논리적 문장"

    ccn_intro: "순환 복잡도는 1976년 Thomas J. McCabe가 개발했으며, 프로그램 소스 코드를 통과하는 선형 독립 경로의 수를 측정합니다."
    ccn_formula_alt: "대안적인 그래프 기반 공식: CCN = E - N + 2P 여기서 E = 엣지, N = 노드, P = 연결된 컴포넌트."
    ccn_why_matters: "높은 CCN은 완전히 테스트하기 어려운 코드를 나타냅니다. CCN이 10인 메소드는 완전한 분기 커버리지를 위해 최소 10개의 테스트 케이스가 필요합니다."

    mi_intro: "유지보수성 지수는 Halstead 볼륨, 순환 복잡도, 코드 라인을 0-100의 단일 점수로 결합한 복합 메트릭입니다."
    mi_volume: "Halstead 볼륨 - 구현 크기 측정"
    mi_ccn: "순환 복잡도 - 구조적 복잡도 측정"
    mi_loc: "코드 라인 - 물리적 크기 측정"
    mi_interpretation: "65 이상의 점수는 일반적으로 허용됩니다. 40 미만의 점수는 리팩토링 우선순위가 높은 코드를 나타냅니다. 복잡도가 증가하면 MI가 감소합니다."

    lcom_intro: "LCOM은 클래스의 메소드가 공유 인스턴스 변수를 통해 서로 얼마나 잘 관련되어 있는지 측정합니다. 응집력 있는 클래스는 같은 데이터에서 함께 작동하는 메소드를 가집니다."
    lcom_formula_variant: "LCOM4 변형"
    lcom_more_specific: "더 구체적으로"
    lcom_why_matters: "높은 LCOM은 클래스가 너무 많은 관련 없는 일을 하고 있어 분할해야 함을 나타냅니다. 각 메소드가 다른 속성을 사용하는 클래스는 여러 클래스로 리팩토링할 후보입니다."

    halstead_intro: "Halstead 메트릭은 1977년 Maurice Halstead가 도입했으며, 코드의 고유 및 전체 연산자와 피연산자를 기반으로 소프트웨어 복잡도를 측정합니다."
    halstead_operators_tracked: "추적되는 연산자"
    halstead_volume_interpretation: "100 미만의 볼륨은 단순한 함수를 나타냅니다. 1000 이상의 볼륨은 코드를 더 작은 단위로 분할해야 함을 나타냅니다. 볼륨 메트릭은 유지보수성 지수 계산에 사용됩니다."

    ratings_intro: "PhpQuality는 모든 메트릭에서 코드 품질 수준을 빠르게 식별하기 위해 문자 등급 시스템(A-F)을 사용합니다."
    ratings_meanings: "등급 의미"
    ratings_excellent: "깨끗하고 유지보수하기 쉬운 코드"
    ratings_good: "약간의 개선 가능"
    ratings_moderate: "리팩토링 고려"
    ratings_poor: "주의 필요"
    ratings_critical: "즉각적인 리팩토링 필요"
    ratings_thresholds: "메트릭별 임계값"

    references: "참고자료"

