    loc_lloc: "Logiska kodrader - Kurbara satser (if, for, return, uttryck, etc.)"
    loc_ratio: "Kommentarsforhallande"
    loc_ratio_formula: "Kommentarsforhallande = (CLOC / LOC) * 100%"
    loc_interpretation: "Ett halsoamt kommentarsforhallande ar vanligtvis mellan 10-30%. For fa kommentarer kan tyda pa dalig dokumentation, medan for manga kommentarer kan tyda pa alltfor komplex kod som behover refaktoreras."
    loc_logical_statements: "Logiska satser som raknas"

    ccn_intro: "Cyklomatisk komplexitet, utvecklad av Thomas J. McCabe 1976, mater antalet linjart oberoende vagar genom ett programs kallkod."
    ccn_formula_alt: "Alternativ grafbaserad formel: CCN = E - N + 2P dar E = kanter, N = noder, P = sammankopplade komponenter."
    ccn_why_matters: "Hog CCN indikerar kod som ar svar att testa fullstandigt. En metod med CCN pa 10 kraver minst 10 testfall for full grentatking."

    mi_intro: "Underhallsindex ar ett sammansatt matvarde som kombinerar Halstead-volym, cyklomatisk komplexitet och kodrader till en enda poang fran 0-100."
    mi_volume: "Halstead-volym - mater storleken pa implementeringen"
    mi_ccn: "Cyklomatisk komplexitet - mater strukturell komplexitet"
    mi_loc: "Kodrader - mater fysisk storlek"
    mi_interpretation: "En poang over 65 ar generellt acceptabel. Poang under 40 indikerar kod som bor prioriteras for refaktorering. MI minskar nar komplexiteten okar."

    lcom_intro: "LCOM mater hur val metoderna i en klass ar relaterade till varandra genom delade instansvariabler. En sammanhallande klass har metoder som arbetar tillsammans pa samma data."
    lcom_formula_variant: "LCOM4-variant"
    lcom_more_specific: "Mer specifikt"
    lcom_why_matters: "Hog LCOM antyder att en klass kan gora for manga orelaterade saker och bor delas. En klass dar varje metod anvander olika egenskaper ar en kandidat for refaktorering till flera klasser."

    halstead_intro: "Halstead-matvarden, introducerade av Maurice Halstead 1977, mater mjukvarukomplexitet baserat pa distinkta och totala operatorer och operander i koden."
    halstead_operators_tracked: "Operatorer som sparas"
    halstead_volume_interpretation: "Volym under 100 indikerar en enkel funktion. Volym over 1000 antyder att koden bor delas upp i mindre enheter. Volymmatvardet anvands vid berakning av underhallsindex."

    ratings_intro: "PhpQuality anvander ett bokstavsbetygssystem (A-F) for att snabbt identifiera kodkvalitetsnivaer over alla matvarden."
    ratings_meanings: "Betygsbetydelser"
    ratings_excellent: "Ren, underhallbar kod"
    ratings_good: "Mindre forbattringar mojliga"
    ratings_moderate: "Overag refaktorering"
    ratings_poor: "Behover uppmarksamhet"
    ratings_critical: "Omedelbar refaktorering kravs"
    ratings_thresholds: "Granser per matvarde"

