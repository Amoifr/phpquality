# Metrics documentation page
docs:
    title: "Metrics Documentation"
    subtitle: "Understanding the code quality metrics measured by PhpQuality"
    quick_nav: "Quick Navigation"
    lines_of_code: "Lines of Code"
    cyclomatic_complexity: "Cyclomatic Complexity"
    maintainability_index: "Maintainability Index"
    lack_of_cohesion: "Lack of Cohesion"
    halstead_metrics: "Halstead Metrics"
    rating_system: "Rating System"

    loc_intro: "Lines of Code metrics measure the size and composition of your codebase."
    loc_metrics: "Metrics"
    loc_total: "Total Lines of Code - All lines in the file including blank lines and comments"
    loc_cloc: "Comment Lines of Code - Lines containing comments (// /* */ # /** */)"
    loc_lloc: "Logical Lines of Code - Executable statements (if, for, return, expressions, etc.)"
    loc_ratio: "Comment Ratio"
    loc_ratio_formula: "Comment Ratio = (CLOC / LOC) * 100%"
    loc_interpretation: "A healthy comment ratio is typically between 10-30%. Too few comments may indicate poor documentation, while excessive comments might suggest overly complex code that needs refactoring."
    loc_logical_statements: "Logical Statements Counted"

    ccn_intro: "Cyclomatic Complexity, developed by Thomas J. McCabe in 1976, measures the number of linearly independent paths through a program's source code."
    ccn_formula_alt: "Alternative graph-based formula: CCN = E - N + 2P where E = edges, N = nodes, P = connected components."
    ccn_why_matters: "High CCN indicates code that is difficult to test completely. A method with CCN of 10 requires at least 10 test cases for full branch coverage."

    mi_intro: "The Maintainability Index is a composite metric that combines Halstead Volume, Cyclomatic Complexity, and Lines of Code into a single score from 0-100."
    mi_volume: "Halstead Volume - measures the size of the implementation"
    mi_ccn: "Cyclomatic Complexity - measures the structural complexity"
    mi_loc: "Lines of Code - measures the physical size"
    mi_interpretation: "A score above 65 is generally acceptable. Scores below 40 indicate code that should be prioritized for refactoring. The MI decreases as complexity increases."

    lcom_intro: "LCOM measures how well the methods of a class are related to each other through shared instance variables. A cohesive class has methods that work together on the same data."
    lcom_formula_variant: "LCOM4 variant"
    lcom_more_specific: "More specifically"
    lcom_why_matters: "High LCOM suggests a class may be doing too many unrelated things and should be split. A class where each method uses different properties is a candidate for refactoring into multiple classes."

    halstead_intro: "Halstead metrics, introduced by Maurice Halstead in 1977, measure software complexity based on the distinct and total operators and operands in the code."
    halstead_operators_tracked: "Operators Tracked"
    halstead_volume_interpretation: "Volume under 100 indicates a simple function. Volume over 1000 suggests the code should be split into smaller units. The Volume metric is used in calculating the Maintainability Index."

    ratings_intro: "PhpQuality uses a letter-grade rating system (A-F) to quickly identify code quality levels across all metrics."
    ratings_meanings: "Rating Meanings"
    ratings_excellent: "Clean, maintainable code"
    ratings_good: "Minor improvements possible"
    ratings_moderate: "Consider refactoring"
    ratings_poor: "Needs attention"
    ratings_critical: "Immediate refactoring needed"
    ratings_thresholds: "Thresholds by Metric"

    references: "References"

