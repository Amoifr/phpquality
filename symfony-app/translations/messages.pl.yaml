# Metrics documentation page
docs:
    title: "Dokumentacja metryk"
    subtitle: "Zrozumienie metryk jakosci kodu mierzonych przez PhpQuality"
    quick_nav: "Szybka nawigacja"
    lines_of_code: "Linie kodu"
    cyclomatic_complexity: "Zlozonosc cyklomatyczna"
    maintainability_index: "Indeks konserwacji"
    lack_of_cohesion: "Brak spojnosci"
    halstead_metrics: "Metryki Halstead"
    rating_system: "System ocen"

    loc_intro: "Metryki LOC mierzą rozmiar i sklad Twojej bazy kodowej."
    loc_metrics: "Metryki"
    loc_total: "Laczna liczba linii kodu - Wszystkie linie w pliku wlącznie z pustymi liniami i komentarzami"
    loc_cloc: "Linie komentarzy - Linie zawierajace komentarze (// /* */ # /** */)"
    loc_lloc: "Logiczne linie kodu - Instrukcje wykonywalne (if, for, return, wyrażenia itp.)"
    loc_ratio: "Stosunek komentarzy"
    loc_ratio_formula: "Stosunek komentarzy = (CLOC / LOC) * 100%"
    loc_interpretation: "Zdrowy stosunek komentarzy wynosi zazwyczaj 10-30%. Zbyt malo komentarzy moze wskazywac na slaba dokumentacje, podczas gdy nadmierne komentarze moga sugerowac zbyt zlozony kod wymagajacy refaktoryzacji."
    loc_logical_statements: "Liczone instrukcje logiczne"

    ccn_intro: "Zlozonosc cyklomatyczna, opracowana przez Thomasa J. McCabe'a w 1976 roku, mierzy liczbe liniowo niezaleznych sciezek przez kod zrodlowy programu."
    ccn_formula_alt: "Alternatywna formula oparta na grafie: CCN = E - N + 2P gdzie E = krawedzie, N = wezly, P = polaczone komponenty."
    ccn_why_matters: "Wysoki CCN wskazuje na kod, ktory trudno w pelni przetestowac. Metoda z CCN rownym 10 wymaga co najmniej 10 przypadkow testowych dla pelnego pokrycia galezi."

    mi_intro: "Indeks konserwacji to zlożona metryka, która łączy objetość Halstead, zlożoność cyklomatyczna i linie kodu w jeden wynik od 0 do 100."
    mi_volume: "Objetość Halstead - mierzy rozmiar implementacji"
    mi_ccn: "Złożoność cyklomatyczna - mierzy złożoność strukturalna"
    mi_loc: "Linie kodu - mierzy rozmiar fizyczny"
    mi_interpretation: "Wynik powyzej 65 jest ogolnie akceptowalny. Wyniki ponizej 40 wskazuja na kod, ktory powinien byc priorytetem do refaktoryzacji. MI maleje wraz ze wzrostem zlozonosci."

    lcom_intro: "LCOM mierzy, jak dobrze metody klasy są ze sobą powiązane poprzez współdzielone zmienne instancji. Spojna klasa ma metody, które pracują razem na tych samych danych."
    lcom_formula_variant: "Wariant LCOM4"
    lcom_more_specific: "Bardziej szczegolowo"
    lcom_why_matters: "Wysoki LCOM sugeruje, ze klasa moze robic zbyt wiele niepowiazanych rzeczy i powinna zostac podzielona. Klasa, w ktorej kazda metoda uzywa roznych wlasciwosci, jest kandydatem do refaktoryzacji na wiele klas."

    halstead_intro: "Metryki Halstead, wprowadzone przez Maurice'a Halsteada w 1977 roku, mierza zlozonosc oprogramowania w oparciu o unikalne i laczne operatory i operandy w kodzie."
    halstead_operators_tracked: "Sledzone operatory"
    halstead_volume_interpretation: "Objetosc ponizej 100 wskazuje na prosta funkcje. Objetosc powyzej 1000 sugeruje, ze kod powinien zostac podzielony na mniejsze jednostki. Metryka objetosci jest uzywana do obliczania indeksu konserwacji."

    ratings_intro: "PhpQuality uzywa literowego systemu ocen (A-F) do szybkiej identyfikacji poziomu jakosci kodu we wszystkich metrykach."
    ratings_meanings: "Znaczenie ocen"
    ratings_excellent: "Czysty, latwy do konserwacji kod"
    ratings_good: "Mozliwe drobne ulepszenia"
    ratings_moderate: "Rozważ refaktoryzacje"
    ratings_poor: "Wymaga uwagi"
    ratings_critical: "Wymaga natychmiastowej refaktoryzacji"
    ratings_thresholds: "Progi wedlug metryki"

    references: "Odniesienia"

