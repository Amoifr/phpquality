    rating_system: "Degerlendirme Sistemi"

    loc_intro: "Kod Satirlari metrikleri kod tabaninizin boyutunu ve bilesenlerini olcer."
    loc_metrics: "Metrikler"
    loc_total: "Toplam Kod Satirlari - Bos satirlar ve yorumlar dahil dosyadaki tum satirlar"
    loc_cloc: "Yorum Kod Satirlari - Yorum iceren satirlar (// /* */ # /** */)"
    loc_lloc: "Mantiksal Kod Satirlari - Calistirilabilir ifadeler (if, for, return, ifadeler, vb.)"
    loc_ratio: "Yorum Orani"
    loc_ratio_formula: "Yorum Orani = (CLOC / LOC) * %100"
    loc_interpretation: "Saglikli yorum orani genellikle %10-30 arasindadir. Cok az yorum zayif dokumantasyonu, asiri yorumlar ise yeniden duzenlenmesi gereken karmasik kodu gosterebilir."
    loc_logical_statements: "Sayilan Mantiksal Ifadeler"

    ccn_intro: "1976'da Thomas J. McCabe tarafindan gelistirilen Siklomatik Karmasiklik, bir programin kaynak kodu araciligiyla dogrusal bagimsiz yollarin sayisini olcer."
    ccn_formula_alt: "Alternatif grafik tabanli formul: CCN = E - N + 2P burada E = kenarlar, N = dugumler, P = bagli bilesenler."
    ccn_why_matters: "Yuksek CCN, tamamen test edilmesi zor kodu gosterir. CCN'si 10 olan bir metod, tam dal kapsamasi icin en az 10 test durumu gerektirir."

    mi_intro: "Bakim Yapilabilirlik Endeksi, Halstead Hacmi, Siklomatik Karmasiklik ve Kod Satirlarini 0-100 arasi tek bir puana birlestiren birlesik bir metriktir."
    mi_volume: "Halstead Hacmi - uygulama boyutunu olcer"
    mi_ccn: "Siklomatik Karmasiklik - yapisal karmasikligi olcer"
    mi_loc: "Kod Satirlari - fiziksel boyutu olcer"
    mi_interpretation: "65'in uzerindeki puan genellikle kabul edilebilir. 40'in altindaki puanlar yeniden duzenleme icin onceliklendirilmesi gereken kodu gosterir. MI, karmasiklik arttikca azalir."

    lcom_intro: "LCOM, bir sinifin metodlarinin paylasilan ornek degiskenler araciligiyla birbirleriyle ne kadar iliskili oldugunu olcer. Uyumlu bir sinif, ayni veriler uzerinde birlikte calisan metodlara sahiptir."
    lcom_formula_variant: "LCOM4 varyanti"
    lcom_more_specific: "Daha spesifik olarak"
    lcom_why_matters: "Yuksek LCOM, bir sinifin cok fazla ilgisiz is yapiyor olabilecegini ve bolunmesi gerektigini gosterir. Her metodun farkli ozellikler kullandigi bir sinif, birden fazla sinifa yeniden duzenlenmek icin adaydir."

    halstead_intro: "1977'de Maurice Halstead tarafindan tanitilan Halstead metrikleri, koddaki farkli ve toplam operator ve operandlara dayali yazilim karmasikligini olcer."
    halstead_operators_tracked: "Izlenen Operatorler"
    halstead_volume_interpretation: "100'un altindaki hacim basit bir fonksiyonu gosterir. 1000'in ustundeki hacim, kodun daha kucuk birimlere bolunmesi gerektigini one surer. Hacim metrigi, Bakim Yapilabilirlik Endeksi hesaplamasinda kullanilir."

    ratings_intro: "PhpQuality, tum metriklerde kod kalite seviyelerini hizla belirlemek icin harf notu degerlendirme sistemi (A-F) kullanir."
    ratings_meanings: "Degerlendirme Anlamlari"
    ratings_excellent: "Temiz, bakim yapilabilir kod"
    ratings_good: "Kucuk iyilestirmeler mumkun"
    ratings_moderate: "Yeniden duzenlemeyi dusunun"
    ratings_poor: "Dikkat gerektiriyor"
    ratings_critical: "Acil yeniden duzenleme gerekli"
    ratings_thresholds: "Metrige Gore Esikler"

