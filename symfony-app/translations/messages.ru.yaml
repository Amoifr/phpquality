    halstead_metrics: "Метрики Halstead"
    rating_system: "Система оценок"

    loc_intro: "Метрики LOC измеряют размер и состав вашей кодовой базы."
    loc_metrics: "Метрики"
    loc_total: "Всего строк кода - все строки в файле включая пустые строки и комментарии"
    loc_cloc: "Строки комментариев - строки, содержащие комментарии (// /* */ # /** */)"
    loc_lloc: "Логические строки кода - исполняемые выражения (if, for, return, выражения и т.д.)"
    loc_ratio: "Доля комментариев"
    loc_ratio_formula: "Доля комментариев = (CLOC / LOC) * 100%"
    loc_interpretation: "Здоровая доля комментариев обычно 10-30%. Слишком мало комментариев может указывать на плохую документацию, в то время как избыточные комментарии могут означать слишком сложный код, требующий рефакторинга."
    loc_logical_statements: "Подсчитываемые логические выражения"

    ccn_intro: "Цикломатическая сложность, разработанная Томасом Дж. Маккейбом в 1976 году, измеряет количество линейно независимых путей через исходный код программы."
    ccn_formula_alt: "Альтернативная формула на основе графа: CCN = E - N + 2P где E = ребра, N = узлы, P = связные компоненты."
    ccn_why_matters: "Высокий CCN указывает на код, который сложно полностью протестировать. Метод с CCN 10 требует как минимум 10 тестовых случаев для полного покрытия ветвей."

    mi_intro: "Индекс сопровождаемости - это составная метрика, объединяющая объем Halstead, цикломатическую сложность и строки кода в единую оценку от 0 до 100."
    mi_volume: "Объем Halstead - измеряет размер реализации"
    mi_ccn: "Цикломатическая сложность - измеряет структурную сложность"
    mi_loc: "Строки кода - измеряет физический размер"
    mi_interpretation: "Оценка выше 65 обычно приемлема. Оценки ниже 40 указывают на код, который следует приоритизировать для рефакторинга. MI уменьшается по мере увеличения сложности."

    lcom_intro: "LCOM измеряет, насколько хорошо методы класса связаны друг с другом через общие переменные экземпляра. Связный класс имеет методы, работающие вместе над одними и теми же данными."
    lcom_formula_variant: "Вариант LCOM4"
    lcom_more_specific: "Более конкретно"
    lcom_why_matters: "Высокий LCOM предполагает, что класс может делать слишком много несвязанных вещей и должен быть разделен. Класс, где каждый метод использует разные свойства, является кандидатом на рефакторинг в несколько классов."

    halstead_intro: "Метрики Halstead, введенные Морисом Холстедом в 1977 году, измеряют сложность ПО на основе уникальных и общих операторов и операндов в коде."
    halstead_operators_tracked: "Отслеживаемые операторы"
    halstead_volume_interpretation: "Объем ниже 100 указывает на простую функцию. Объем выше 1000 предполагает, что код следует разделить на меньшие единицы. Метрика объема используется при расчете индекса сопровождаемости."

    ratings_intro: "PhpQuality использует буквенную систему оценок (A-F) для быстрой идентификации уровней качества кода по всем метрикам."
    ratings_meanings: "Значения оценок"
    ratings_excellent: "Чистый, сопровождаемый код"
    ratings_good: "Возможны небольшие улучшения"
    ratings_moderate: "Рассмотрите рефакторинг"
    ratings_poor: "Требует внимания"
    ratings_critical: "Требуется немедленный рефакторинг"
    ratings_thresholds: "Пороги по метрикам"

    references: "Ссылки"

