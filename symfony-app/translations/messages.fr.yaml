# Metrics documentation page
docs:
    title: "Documentation des métriques"
    subtitle: "Comprendre les métriques de qualité du code mesurées par PhpQuality"
    quick_nav: "Navigation rapide"
    lines_of_code: "Lignes de code"
    cyclomatic_complexity: "Complexité cyclomatique"
    maintainability_index: "Index de maintenabilité"
    lack_of_cohesion: "Manque de cohésion"
    halstead_metrics: "Métriques Halstead"
    rating_system: "Système de notation"

    loc_intro: "Les métriques de lignes de code mesurent la taille et la composition de votre base de code."
    loc_metrics: "Métriques"
    loc_total: "Lignes totales de code - Toutes les lignes du fichier incluant lignes vides et commentaires"
    loc_cloc: "Lignes de commentaires - Lignes contenant des commentaires (// /* */ # /** */)"
    loc_lloc: "Lignes logiques de code - Instructions exécutables (if, for, return, expressions, etc.)"
    loc_ratio: "Ratio de commentaires"
    loc_ratio_formula: "Ratio de commentaires = (CLOC / LOC) * 100%"
    loc_interpretation: "Un ratio de commentaires sain est typiquement entre 10-30%. Trop peu de commentaires peut indiquer une documentation insuffisante, tandis que trop de commentaires pourrait suggérer un code trop complexe nécessitant un refactoring."
    loc_logical_statements: "Instructions logiques comptées"

    ccn_intro: "La complexité cyclomatique, développée par Thomas J. McCabe en 1976, mesure le nombre de chemins linéairement indépendants à travers le code source d'un programme."
    ccn_formula_alt: "Formule alternative basée sur le graphe : CCN = E - N + 2P où E = arêtes, N = nœuds, P = composantes connexes."
    ccn_why_matters: "Un CCN élevé indique du code difficile à tester complètement. Une méthode avec un CCN de 10 nécessite au moins 10 cas de test pour une couverture complète des branches."

    mi_intro: "L'index de maintenabilité est une métrique composite qui combine le volume Halstead, la complexité cyclomatique et les lignes de code en un score unique de 0 à 100."
    mi_volume: "Volume Halstead - mesure la taille de l'implémentation"
    mi_ccn: "Complexité cyclomatique - mesure la complexité structurelle"
    mi_loc: "Lignes de code - mesure la taille physique"
    mi_interpretation: "Un score supérieur à 65 est généralement acceptable. Les scores inférieurs à 40 indiquent du code qui devrait être priorisé pour le refactoring. Le MI diminue quand la complexité augmente."

    lcom_intro: "LCOM mesure à quel point les méthodes d'une classe sont liées les unes aux autres par des variables d'instance partagées. Une classe cohésive a des méthodes qui travaillent ensemble sur les mêmes données."
    lcom_formula_variant: "Variante LCOM4"
    lcom_more_specific: "Plus spécifiquement"
    lcom_why_matters: "Un LCOM élevé suggère qu'une classe fait peut-être trop de choses non liées et devrait être divisée. Une classe où chaque méthode utilise différentes propriétés est candidate au refactoring en plusieurs classes."

    halstead_intro: "Les métriques Halstead, introduites par Maurice Halstead en 1977, mesurent la complexité logicielle basée sur les opérateurs et opérandes distincts et totaux dans le code."
    halstead_operators_tracked: "Opérateurs suivis"
    halstead_volume_interpretation: "Un volume inférieur à 100 indique une fonction simple. Un volume supérieur à 1000 suggère que le code devrait être divisé en unités plus petites. La métrique de volume est utilisée dans le calcul de l'index de maintenabilité."

    ratings_intro: "PhpQuality utilise un système de notation par lettres (A-F) pour identifier rapidement les niveaux de qualité du code à travers toutes les métriques."
    ratings_meanings: "Signification des notes"
    ratings_excellent: "Code propre et maintenable"
    ratings_good: "Améliorations mineures possibles"
    ratings_moderate: "Envisager le refactoring"
    ratings_poor: "Nécessite de l'attention"
    ratings_critical: "Refactoring immédiat nécessaire"
    ratings_thresholds: "Seuils par métrique"

    references: "Références"

