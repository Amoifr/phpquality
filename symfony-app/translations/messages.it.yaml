# Metrics documentation page
docs:
    title: "Documentazione delle Metriche"
    subtitle: "Comprendere le metriche di qualita del codice misurate da PhpQuality"
    quick_nav: "Navigazione Rapida"
    lines_of_code: "Linee di Codice"
    cyclomatic_complexity: "Complessita Ciclomatica"
    maintainability_index: "Indice di Manutenibilita"
    lack_of_cohesion: "Mancanza di Coesione"
    halstead_metrics: "Metriche Halstead"
    rating_system: "Sistema di Valutazione"

    loc_intro: "Le metriche LOC misurano la dimensione e la composizione della tua codebase."
    loc_metrics: "Metriche"
    loc_total: "Linee di Codice Totali - Tutte le linee nel file incluse linee vuote e commenti"
    loc_cloc: "Linee di Commento - Linee contenenti commenti (// /* */ # /** */)"
    loc_lloc: "Linee di Codice Logiche - Istruzioni eseguibili (if, for, return, espressioni, ecc.)"
    loc_ratio: "Rapporto Commenti"
    loc_ratio_formula: "Rapporto Commenti = (CLOC / LOC) * 100%"
    loc_interpretation: "Un rapporto commenti sano e tipicamente tra 10-30%. Troppo pochi commenti possono indicare scarsa documentazione, mentre commenti eccessivi potrebbero suggerire codice troppo complesso che necessita refactoring."
    loc_logical_statements: "Istruzioni Logiche Contate"

    ccn_intro: "La Complessita Ciclomatica, sviluppata da Thomas J. McCabe nel 1976, misura il numero di percorsi linearmente indipendenti attraverso il codice sorgente di un programma."
    ccn_formula_alt: "Formula alternativa basata su grafi: CCN = E - N + 2P dove E = archi, N = nodi, P = componenti connessi."
    ccn_why_matters: "Alta CCN indica codice difficile da testare completamente. Un metodo con CCN di 10 richiede almeno 10 casi di test per copertura completa dei rami."

    mi_intro: "L'Indice di Manutenibilita e una metrica composita che combina Volume Halstead, Complessita Ciclomatica e Linee di Codice in un singolo punteggio da 0-100."
    mi_volume: "Volume Halstead - misura la dimensione dell'implementazione"
    mi_ccn: "Complessita Ciclomatica - misura la complessita strutturale"
    mi_loc: "Linee di Codice - misura la dimensione fisica"
    mi_interpretation: "Un punteggio sopra 65 e generalmente accettabile. Punteggi sotto 40 indicano codice che dovrebbe essere prioritizzato per refactoring. Il MI diminuisce all'aumentare della complessita."

    lcom_intro: "LCOM misura quanto bene i metodi di una classe sono correlati tra loro attraverso variabili di istanza condivise. Una classe coesa ha metodi che lavorano insieme sugli stessi dati."
    lcom_formula_variant: "Variante LCOM4"
    lcom_more_specific: "Piu specificamente"
    lcom_why_matters: "Alto LCOM suggerisce che una classe potrebbe fare troppe cose non correlate e dovrebbe essere divisa. Una classe dove ogni metodo usa proprieta diverse e candidata per refactoring in multiple classi."

    halstead_intro: "Le metriche Halstead, introdotte da Maurice Halstead nel 1977, misurano la complessita del software basandosi sugli operatori e operandi distinti e totali nel codice."
    halstead_operators_tracked: "Operatori Tracciati"
    halstead_volume_interpretation: "Volume sotto 100 indica una funzione semplice. Volume sopra 1000 suggerisce che il codice dovrebbe essere diviso in unita piu piccole. La metrica Volume e usata nel calcolo dell'Indice di Manutenibilita."

    ratings_intro: "PhpQuality usa un sistema di valutazione a lettere (A-F) per identificare rapidamente i livelli di qualita del codice in tutte le metriche."
    ratings_meanings: "Significati delle Valutazioni"
    ratings_excellent: "Codice pulito e manutenibile"
    ratings_good: "Miglioramenti minori possibili"
    ratings_moderate: "Considerare refactoring"
    ratings_poor: "Necessita attenzione"
    ratings_critical: "Refactoring immediato necessario"
    ratings_thresholds: "Soglie per Metrica"

    references: "Riferimenti"

