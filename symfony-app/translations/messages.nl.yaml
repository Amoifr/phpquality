# Metrics documentation page
docs:
    title: "Metriekendocumentatie"
    subtitle: "Begrip van de codekwaliteitsmetrieken gemeten door PhpQuality"
    quick_nav: "Snelle Navigatie"
    lines_of_code: "Regels Code"
    cyclomatic_complexity: "Cyclomatische Complexiteit"
    maintainability_index: "Onderhoudbaarheidsindex"
    lack_of_cohesion: "Gebrek aan Cohesie"
    halstead_metrics: "Halstead Metrieken"
    rating_system: "Beoordelingssysteem"

    loc_intro: "LOC-metrieken meten de grootte en samenstelling van je codebase."
    loc_metrics: "Metrieken"
    loc_total: "Totale Regels Code - Alle regels in het bestand inclusief lege regels en commentaar"
    loc_cloc: "Commentaarregels - Regels met commentaar (// /* */ # /** */)"
    loc_lloc: "Logische Regels Code - Uitvoerbare statements (if, for, return, expressies, enz.)"
    loc_ratio: "Commentaarverhouding"
    loc_ratio_formula: "Commentaarverhouding = (CLOC / LOC) * 100%"
    loc_interpretation: "Een gezonde commentaarverhouding ligt typisch tussen 10-30%. Te weinig commentaar kan wijzen op slechte documentatie, terwijl te veel commentaar kan wijzen op te complexe code die refactoring nodig heeft."
    loc_logical_statements: "Getelde Logische Statements"

    ccn_intro: "Cyclomatische Complexiteit, ontwikkeld door Thomas J. McCabe in 1976, meet het aantal lineair onafhankelijke paden door de broncode van een programma."
    ccn_formula_alt: "Alternatieve grafengebaseerde formule: CCN = E - N + 2P waarbij E = kanten, N = knopen, P = verbonden componenten."
    ccn_why_matters: "Hoge CCN wijst op code die moeilijk volledig te testen is. Een methode met CCN van 10 vereist minstens 10 testgevallen voor volledige branchdekking."

    mi_intro: "De Onderhoudbaarheidsindex is een samengestelde metriek die Halstead Volume, Cyclomatische Complexiteit en Regels Code combineert in een enkele score van 0-100."
    mi_volume: "Halstead Volume - meet de grootte van de implementatie"
    mi_ccn: "Cyclomatische Complexiteit - meet de structurele complexiteit"
    mi_loc: "Regels Code - meet de fysieke grootte"
    mi_interpretation: "Een score boven 65 is over het algemeen acceptabel. Scores onder 40 wijzen op code die prioriteit moet krijgen voor refactoring. De MI daalt naarmate de complexiteit toeneemt."

    lcom_intro: "LCOM meet hoe goed de methoden van een klasse aan elkaar gerelateerd zijn via gedeelde instantievariabelen. Een cohesieve klasse heeft methoden die samenwerken aan dezelfde gegevens."
    lcom_formula_variant: "LCOM4-variant"
    lcom_more_specific: "Specifieker"
    lcom_why_matters: "Hoge LCOM suggereert dat een klasse mogelijk te veel niet-gerelateerde dingen doet en moet worden opgesplitst. Een klasse waar elke methode verschillende eigenschappen gebruikt is een kandidaat voor refactoring naar meerdere klassen."

    halstead_intro: "Halstead-metrieken, geintroduceerd door Maurice Halstead in 1977, meten softwarecomplexiteit gebaseerd op de unieke en totale operatoren en operanden in de code."
    halstead_operators_tracked: "Gevolgde Operatoren"
    halstead_volume_interpretation: "Volume onder 100 duidt op een eenvoudige functie. Volume boven 1000 suggereert dat de code moet worden opgesplitst in kleinere eenheden. De Volume-metriek wordt gebruikt bij het berekenen van de Onderhoudbaarheidsindex."

    ratings_intro: "PhpQuality gebruikt een letterbeoordelingssysteem (A-F) om snel codekwaliteitsniveaus over alle metrieken te identificeren."
    ratings_meanings: "Beoordelingsbetekenissen"
    ratings_excellent: "Schone, onderhoudbare code"
    ratings_good: "Kleine verbeteringen mogelijk"
    ratings_moderate: "Overweeg refactoring"
    ratings_poor: "Heeft aandacht nodig"
    ratings_critical: "Onmiddellijke refactoring nodig"
    ratings_thresholds: "Drempelwaarden per Metriek"

    references: "Referenties"

