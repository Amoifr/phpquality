# Metrics documentation page
docs:
    title: "メトリクスドキュメント"
    subtitle: "PhpQualityが測定するコード品質メトリクスの理解"
    quick_nav: "クイックナビゲーション"
    lines_of_code: "コード行数"
    cyclomatic_complexity: "循環的複雑度"
    maintainability_index: "保守性指数"
    lack_of_cohesion: "凝集性欠如"
    halstead_metrics: "Halstadメトリクス"
    rating_system: "評価システム"

    loc_intro: "LOCメトリクスはコードベースのサイズと構成を測定します。"
    loc_metrics: "メトリクス"
    loc_total: "総コード行数 - 空白行とコメントを含むファイル内のすべての行"
    loc_cloc: "コメント行 - コメントを含む行（// /* */ # /** */）"
    loc_lloc: "論理コード行 - 実行可能ステートメント（if, for, return, 式など）"
    loc_ratio: "コメント比率"
    loc_ratio_formula: "コメント比率 = (CLOC / LOC) * 100%"
    loc_interpretation: "健全なコメント比率は通常10-30%です。コメントが少なすぎるとドキュメント不足を示し、多すぎるとリファクタリングが必要な複雑なコードを示唆する可能性があります。"
    loc_logical_statements: "カウントされる論理ステートメント"

    ccn_intro: "循環的複雑度は、1976年にThomas J. McCabeによって開発され、プログラムのソースコードを通る線形独立パスの数を測定します。"
    ccn_formula_alt: "代替グラフベース式: CCN = E - N + 2P ここでE = エッジ, N = ノード, P = 接続コンポーネント。"
    ccn_why_matters: "高いCCNは完全にテストすることが難しいコードを示します。CCNが10のメソッドは完全な分岐カバレッジに少なくとも10のテストケースが必要です。"

    mi_intro: "保守性指数は、Halstadボリューム、循環的複雑度、コード行数を0-100の単一スコアに組み合わせた複合メトリクスです。"
    mi_volume: "Halstadボリューム - 実装のサイズを測定"
    mi_ccn: "循環的複雑度 - 構造的複雑度を測定"
    mi_loc: "コード行数 - 物理的サイズを測定"
    mi_interpretation: "65以上のスコアは一般的に許容されます。40未満のスコアはリファクタリングの優先度が高いコードを示します。複雑度が増すとMIは減少します。"

    lcom_intro: "LCOMは、クラスのメソッドが共有インスタンス変数を通じて互いにどの程度関連しているかを測定します。凝集性のあるクラスは同じデータで一緒に動作するメソッドを持っています。"
    lcom_formula_variant: "LCOM4バリアント"
    lcom_more_specific: "より具体的には"
    lcom_why_matters: "高いLCOMはクラスが関連のないことをしすぎている可能性があり、分割すべきことを示唆します。各メソッドが異なるプロパティを使用するクラスは、複数のクラスへのリファクタリングの候補です。"

    halstead_intro: "Halstadメトリクスは、1977年にMaurice Halstadによって導入され、コード内のユニークおよび総演算子とオペランドに基づいてソフトウェアの複雑度を測定します。"
    halstead_operators_tracked: "追跡される演算子"
    halstead_volume_interpretation: "100未満のボリュームは単純な関数を示します。1000を超えるボリュームはコードをより小さな単位に分割すべきことを示唆します。ボリュームメトリクスは保守性指数の計算に使用されます。"

    ratings_intro: "PhpQualityは、すべてのメトリクスでコード品質レベルを素早く識別するために文字評価システム（A-F）を使用します。"
    ratings_meanings: "評価の意味"
    ratings_excellent: "クリーンで保守しやすいコード"
    ratings_good: "わずかな改善の余地あり"
    ratings_moderate: "リファクタリングを検討"
    ratings_poor: "注意が必要"
    ratings_critical: "即座のリファクタリングが必要"
    ratings_thresholds: "メトリクス別しきい値"

    references: "参考文献"

