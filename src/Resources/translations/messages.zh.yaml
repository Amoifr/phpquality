    loc_interpretation: "健康的注释比率通常在10-30%之间。注释太少可能表示文档不足，而过多的注释可能暗示代码过于复杂，需要重构。"
    loc_logical_statements: "统计的逻辑语句"

    ccn_intro: "圈复杂度由Thomas J. McCabe于1976年开发，衡量程序源代码中线性独立路径的数量。"
    ccn_formula_alt: "替代的基于图的公式: CCN = E - N + 2P 其中E = 边, N = 节点, P = 连接组件。"
    ccn_why_matters: "高CCN表示代码难以完全测试。CCN为10的方法需要至少10个测试用例才能完全覆盖分支。"

    mi_intro: "可维护性指数是一个复合指标，将Halstead体积、圈复杂度和代码行数组合成0-100的单一分数。"
    mi_volume: "Halstead体积 - 衡量实现的大小"
    mi_ccn: "圈复杂度 - 衡量结构复杂度"
    mi_loc: "代码行数 - 衡量物理大小"
    mi_interpretation: "65以上的分数通常是可接受的。低于40的分数表示代码应优先进行重构。随着复杂度增加，MI会下降。"

    lcom_intro: "LCOM衡量类的方法通过共享实例变量相互关联的程度。内聚的类具有在相同数据上协同工作的方法。"
    lcom_formula_variant: "LCOM4变体"
    lcom_more_specific: "更具体地说"
    lcom_why_matters: "高LCOM表明类可能在做太多不相关的事情，应该被拆分。每个方法使用不同属性的类是重构为多个类的候选者。"

    halstead_intro: "Halstead指标由Maurice Halstead于1977年引入，基于代码中的唯一和总运算符和操作数来衡量软件复杂度。"
    halstead_operators_tracked: "跟踪的运算符"
    halstead_volume_interpretation: "体积低于100表示简单函数。体积超过1000表明代码应该拆分成更小的单元。体积指标用于计算可维护性指数。"

    ratings_intro: "PhpQuality使用字母评级系统（A-F）来快速识别所有指标的代码质量级别。"
