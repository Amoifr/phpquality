# Metrics documentation page
docs:
    title: "Metriken-Dokumentation"
    subtitle: "Verstehen der von PhpQuality gemessenen Codequalitatsmetriken"
    quick_nav: "Schnellnavigation"
    lines_of_code: "Codezeilen"
    cyclomatic_complexity: "Zyklomatische Komplexitat"
    maintainability_index: "Wartbarkeitsindex"
    lack_of_cohesion: "Kohasionsmangel"
    halstead_metrics: "Halstead-Metriken"
    rating_system: "Bewertungssystem"

    loc_intro: "LOC-Metriken messen die Grobe und Zusammensetzung Ihrer Codebasis."
    loc_metrics: "Metriken"
    loc_total: "Gesamtcodezeilen - Alle Zeilen in der Datei einschlieslich Leerzeilen und Kommentare"
    loc_cloc: "Kommentarzeilen - Zeilen mit Kommentaren (// /* */ # /** */)"
    loc_lloc: "Logische Codezeilen - Ausfuhrbare Anweisungen (if, for, return, Ausdrucke, usw.)"
    loc_ratio: "Kommentarverhaltnis"
    loc_ratio_formula: "Kommentarverhaltnis = (CLOC / LOC) * 100%"
    loc_interpretation: "Ein gesundes Kommentarverhaltnis liegt typischerweise zwischen 10-30%. Zu wenige Kommentare konnen auf schlechte Dokumentation hinweisen, wahrend zu viele Kommentare auf ubermabig komplexen Code hindeuten konnten, der Refactoring benotigt."
    loc_logical_statements: "Gezahlte logische Anweisungen"

    ccn_intro: "Zyklomatische Komplexitat, entwickelt von Thomas J. McCabe 1976, misst die Anzahl der linear unabhangigen Pfade durch den Quellcode eines Programms."
    ccn_formula_alt: "Alternative graphbasierte Formel: CCN = E - N + 2P wobei E = Kanten, N = Knoten, P = verbundene Komponenten."
    ccn_why_matters: "Hohe CCN zeigt Code an, der schwer vollstandig zu testen ist. Eine Methode mit CCN von 10 erfordert mindestens 10 Testfalle fur vollstandige Verzweigungsabdeckung."

    mi_intro: "Der Wartbarkeitsindex ist eine zusammengesetzte Metrik, die Halstead-Volumen, zyklomatische Komplexitat und Codezeilen in einer einzigen Punktzahl von 0-100 kombiniert."
    mi_volume: "Halstead-Volumen - misst die Grobe der Implementierung"
    mi_ccn: "Zyklomatische Komplexitat - misst die strukturelle Komplexitat"
    mi_loc: "Codezeilen - misst die physische Grobe"
    mi_interpretation: "Eine Punktzahl uber 65 ist im Allgemeinen akzeptabel. Punktzahlen unter 40 weisen auf Code hin, der fur Refactoring priorisiert werden sollte. Der MI sinkt mit zunehmender Komplexitat."

    lcom_intro: "LCOM misst, wie gut die Methoden einer Klasse durch gemeinsame Instanzvariablen miteinander verbunden sind. Eine kohasive Klasse hat Methoden, die zusammen auf denselben Daten arbeiten."
    lcom_formula_variant: "LCOM4-Variante"
    lcom_more_specific: "Genauer gesagt"
    lcom_why_matters: "Hoher LCOM deutet darauf hin, dass eine Klasse moglicherweise zu viele nicht verwandte Dinge tut und aufgeteilt werden sollte. Eine Klasse, in der jede Methode unterschiedliche Eigenschaften verwendet, ist ein Kandidat fur Refactoring in mehrere Klassen."

    halstead_intro: "Halstead-Metriken, eingefuhrt von Maurice Halstead 1977, messen Software-Komplexitat basierend auf den unterschiedlichen und gesamten Operatoren und Operanden im Code."
    halstead_operators_tracked: "Verfolgte Operatoren"
    halstead_volume_interpretation: "Volumen unter 100 zeigt eine einfache Funktion an. Volumen uber 1000 deutet darauf hin, dass der Code in kleinere Einheiten aufgeteilt werden sollte. Die Volumen-Metrik wird bei der Berechnung des Wartbarkeitsindex verwendet."

    ratings_intro: "PhpQuality verwendet ein Buchstaben-Bewertungssystem (A-F), um Codequalitatsebenen uber alle Metriken hinweg schnell zu identifizieren."
    ratings_meanings: "Bewertungsbedeutungen"
    ratings_excellent: "Sauberer, wartbarer Code"
    ratings_good: "Kleinere Verbesserungen moglich"
    ratings_moderate: "Refactoring erwagen"
    ratings_poor: "Erfordert Aufmerksamkeit"
    ratings_critical: "Sofortiges Refactoring erforderlich"
    ratings_thresholds: "Schwellenwerte nach Metrik"

    references: "Referenzen"

