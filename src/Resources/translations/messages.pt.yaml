# Metrics documentation page
docs:
    title: "Documentacao de Metricas"
    subtitle: "Entendendo as metricas de qualidade de codigo medidas pelo PhpQuality"
    quick_nav: "Navegacao Rapida"
    lines_of_code: "Linhas de Codigo"
    cyclomatic_complexity: "Complexidade Ciclomatica"
    maintainability_index: "Indice de Manutenibilidade"
    lack_of_cohesion: "Falta de Coesao"
    halstead_metrics: "Metricas Halstead"
    rating_system: "Sistema de Classificacao"

    loc_intro: "As metricas LOC medem o tamanho e composicao da sua base de codigo."
    loc_metrics: "Metricas"
    loc_total: "Linhas de Codigo Totais - Todas as linhas no arquivo incluindo linhas vazias e comentarios"
    loc_cloc: "Linhas de Comentario - Linhas contendo comentarios (// /* */ # /** */)"
    loc_lloc: "Linhas de Codigo Logicas - Instrucoes executaveis (if, for, return, expressoes, etc.)"
    loc_ratio: "Proporcao de Comentarios"
    loc_ratio_formula: "Proporcao de Comentarios = (CLOC / LOC) * 100%"
    loc_interpretation: "Uma proporcao de comentarios saudavel e tipicamente entre 10-30%. Poucos comentarios podem indicar documentacao fraca, enquanto comentarios excessivos podem sugerir codigo muito complexo que precisa de refatoracao."
    loc_logical_statements: "Instrucoes Logicas Contadas"

    ccn_intro: "A Complexidade Ciclomatica, desenvolvida por Thomas J. McCabe em 1976, mede o numero de caminhos linearmente independentes atraves do codigo fonte de um programa."
    ccn_formula_alt: "Formula alternativa baseada em grafos: CCN = E - N + 2P onde E = arestas, N = nos, P = componentes conectados."
    ccn_why_matters: "Alta CCN indica codigo dificil de testar completamente. Um metodo com CCN de 10 requer pelo menos 10 casos de teste para cobertura completa de ramos."

    mi_intro: "O Indice de Manutenibilidade e uma metrica composta que combina Volume Halstead, Complexidade Ciclomatica e Linhas de Codigo em uma pontuacao unica de 0-100."
    mi_volume: "Volume Halstead - mede o tamanho da implementacao"
    mi_ccn: "Complexidade Ciclomatica - mede a complexidade estrutural"
    mi_loc: "Linhas de Codigo - mede o tamanho fisico"
    mi_interpretation: "Uma pontuacao acima de 65 e geralmente aceitavel. Pontuacoes abaixo de 40 indicam codigo que deve ser priorizado para refatoracao. O MI diminui conforme a complexidade aumenta."

    lcom_intro: "LCOM mede quao bem os metodos de uma classe estao relacionados entre si atraves de variaveis de instancia compartilhadas. Uma classe coesa tem metodos que trabalham juntos nos mesmos dados."
    lcom_formula_variant: "Variante LCOM4"
    lcom_more_specific: "Mais especificamente"
    lcom_why_matters: "Alto LCOM sugere que uma classe pode estar fazendo muitas coisas nao relacionadas e deve ser dividida. Uma classe onde cada metodo usa propriedades diferentes e candidata para refatoracao em multiplas classes."

    halstead_intro: "As metricas Halstead, introduzidas por Maurice Halstead em 1977, medem a complexidade do software baseando-se nos operadores e operandos distintos e totais no codigo."
    halstead_operators_tracked: "Operadores Rastreados"
    halstead_volume_interpretation: "Volume abaixo de 100 indica uma funcao simples. Volume acima de 1000 sugere que o codigo deve ser dividido em unidades menores. A metrica de Volume e usada no calculo do Indice de Manutenibilidade."

    ratings_intro: "PhpQuality usa um sistema de classificacao por letras (A-F) para identificar rapidamente os niveis de qualidade do codigo em todas as metricas."
    ratings_meanings: "Significados das Classificacoes"
    ratings_excellent: "Codigo limpo e manutenivel"
    ratings_good: "Melhorias menores possiveis"
    ratings_moderate: "Considerar refatoracao"
    ratings_poor: "Precisa de atencao"
    ratings_critical: "Refatoracao imediata necessaria"
    ratings_thresholds: "Limites por Metrica"

    references: "Referencias"

